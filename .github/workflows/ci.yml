name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the test job only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    name: bridge tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.13"]   # floor + latest (Pillow 12 behaved differently)
    defaults:
      run:
        working-directory: linux-bridge
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Set up uv + Python
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: Run the test suite
        run: uv run pytest -q

  firmware:
    name: firmware tests (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Set up uv + Python
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Run the native unit tests
        run: uvx --from platformio pio test -e native
